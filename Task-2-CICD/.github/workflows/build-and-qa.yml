name: Build, Scan, IaC Check, Deploy QA

on:
  pull_request:
    branches: [main]
  push:
    branches: [qa]

env:
  GCP_PROJECT: flowvelly-healthcare-qa
  GCP_REGION: us-central1
  IMAGE_REPO: us-central1-docker.pkg.dev/${{ env.GCP_PROJECT }}/inference-repo
  IMAGE_NAME: inference-service

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    outputs:
      IMAGE_TAG: ${{ steps.set-image-tag.outputs.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Configure gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT }}
          export_default_credentials: true
      - name: Configure Artifact Registry auth
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
      - name: Set image tag
        id: set-image-tag
        run: echo "IMAGE_TAG=${IMAGE_REPO}/${IMAGE_NAME}:sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Build container image
        run: |
          docker build -t "${{ steps.set-image-tag.outputs.IMAGE_TAG }}" .
          docker push "${{ steps.set-image-tag.outputs.IMAGE_TAG }}"
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.8.1
        with:
          image-ref: ${{ steps.set-image-tag.outputs.IMAGE_TAG }}
          scan-type: image
          format: table
          exit-code: 1
      - name: Upload scan report
        run: |
          mkdir -p scan-reports
          trivy image --quiet --format json --output scan-reports/trivy-image.json ${{ steps.set-image-tag.outputs.IMAGE_TAG }}
      - name: Terraform fmt + validate + plan
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.0
      - name: Terraform format check
        working-directory: infra
        run: terraform fmt -check
      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false
      - name: Terraform validate
        working-directory: infra
        run: terraform validate
      - name: Terraform plan
        working-directory: infra
        run: terraform plan -input=false -var="project_id=${{ env.GCP_PROJECT }}" -var="region=${{ env.GCP_REGION }}" -out=plan.out
      - name: Upload audit evidence
        if: github.ref == 'refs/heads/qa'
        run: |
          mkdir -p audit
          cat > audit/qa-deploy-audit.txt <<'EOF'
          who: $GITHUB_ACTOR
          what: automated qa deployment
          when: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          image: ${{ steps.set-image-tag.outputs.IMAGE_TAG }}
          branch: $GITHUB_REF_NAME
          approval: automatic QA pipeline
          EOF
      - uses: actions/upload-artifact@v3
        if: github.ref == 'refs/heads/qa'
        with:
          name: qa-deploy-audit
          path: audit/qa-deploy-audit.txt

  deploy-qa:
    if: github.ref == 'refs/heads/qa'
    runs-on: ubuntu-latest
    needs: build-and-scan
    environment: qa
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Configure gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT }}
          export_default_credentials: true
      - name: Get QA cluster credentials
        run: |
          gcloud container clusters get-credentials "${{ secrets.QA_CLUSTER_NAME }}" \
            --region "${{ secrets.QA_CLUSTER_LOCATION }}" \
            --project "${{ env.GCP_PROJECT }}"
      - name: Deploy inference workload to QA
        run: |
          IMAGE_TAG="${{ needs.build-and-scan.outputs.IMAGE_TAG }}"
          export IMAGE_TAG
          export PROJECT_ID="${{ env.GCP_PROJECT }}"
          envsubst < k8s/inference-deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/inference-service --namespace inference --timeout=120s
      - name: Verify QA rollout
        run: kubectl get deployment inference-service --namespace inference
