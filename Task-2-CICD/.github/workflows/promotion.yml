name: Promote Inference Service

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target environment for promotion
        required: true
        default: preprod
        type: choice
        options:
          - qa
          - preprod
          - prod
      image_tag:
        description: Full image tag to deploy (Artifact Registry or GCR)
        required: true
        default: ''

env:
  GCP_PROJECT_QA: flowvelly-healthcare-qa
  GCP_PROJECT_PREPROD: flowvelly-healthcare-preprod
  GCP_PROJECT_PROD: flowvelly-healthcare-prod

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Configure gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT_QA }}
          export_default_credentials: true
      - name: Compute target settings
        id: target-settings
        run: |
          case "${{ github.event.inputs.target }}" in
            qa)
              echo "PROJECT=${GCP_PROJECT_QA}" >> $GITHUB_OUTPUT
              echo "CLUSTER_NAME=${{ secrets.QA_CLUSTER_NAME }}" >> $GITHUB_OUTPUT
              echo "CLUSTER_LOCATION=${{ secrets.QA_CLUSTER_LOCATION }}" >> $GITHUB_OUTPUT
              ;;
            preprod)
              echo "PROJECT=${GCP_PROJECT_PREPROD}" >> $GITHUB_OUTPUT
              echo "CLUSTER_NAME=${{ secrets.PREPROD_CLUSTER_NAME }}" >> $GITHUB_OUTPUT
              echo "CLUSTER_LOCATION=${{ secrets.PREPROD_CLUSTER_LOCATION }}" >> $GITHUB_OUTPUT
              ;;
            prod)
              echo "PROJECT=${GCP_PROJECT_PROD}" >> $GITHUB_OUTPUT
              echo "CLUSTER_NAME=${{ secrets.PROD_CLUSTER_NAME }}" >> $GITHUB_OUTPUT
              echo "CLUSTER_LOCATION=${{ secrets.PROD_CLUSTER_LOCATION }}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unsupported target" >&2
              exit 1
              ;;
          esac
      - name: Use target project
        run: |
          gcloud config set project "${{ steps.target-settings.outputs.PROJECT }}"
      - name: Get cluster credentials
        run: |
          gcloud container clusters get-credentials "${{ steps.target-settings.outputs.CLUSTER_NAME }}" \
            --region "${{ steps.target-settings.outputs.CLUSTER_LOCATION }}" \
            --project "${{ steps.target-settings.outputs.PROJECT }}"
      - name: Record promotion audit evidence
        run: |
          mkdir -p audit
          cat > audit/promotion-evidence.txt <<'EOF'
          who: $GITHUB_ACTOR
          what: promotion to ${{ github.event.inputs.target }}
          when: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          image: ${{ github.event.inputs.image_tag }}
          workflow: $GITHUB_WORKFLOW
          run_id: $GITHUB_RUN_ID
          approval: GitHub environment protection for ${{ github.event.inputs.target }}
          EOF
      - uses: actions/upload-artifact@v3
        with:
          name: promotion-audit
          path: audit/promotion-evidence.txt
      - name: Deploy inference workload
        run: |
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          envsubst < k8s/inference-deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/inference-service --namespace inference --timeout=120s
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          PROJECT_ID: ${{ steps.target-settings.outputs.PROJECT }}
