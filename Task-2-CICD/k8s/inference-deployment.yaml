apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-service
  namespace: inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-service
  template:
    metadata:
      labels:
        app: inference-service
    spec:
      serviceAccountName: inference-service-wi
      containers:
        - name: inference-service
          image: "${IMAGE_TAG}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SECRET_CONFIG_NAME
              value: "projects/${PROJECT_ID}/secrets/inference-service-config"
            - name: SERVICE_ENV
              value: "qa"
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
